<!DOCTYPE html>
<html>
  <head>
    <title>ChatBot</title>
  </head>
  <style>
    body{
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
    }
    .send-button{
        background-color: rgb(25, 135, 84);
        border-radius: 10px;
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        font-size: 15px;
        cursor: pointer;
    }
    .chat-input{
        padding:12px 20px ;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
    }
   .chat-input-container{
    display: flex;
    margin-bottom: 60px;
    
   }
   .app-container{
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    
   }
   .chat-message-user{
    display: flex;
    justify-content: end;
    align-items: start;
   }
   .chat-message-robot{
    display: flex;
    align-items: start;
    
   }
   .chat-message-text{
    background-color: rgb(238,238,238);
    font-family: Arial;
    padding: 15px 20px;
    border-radius: 10px;
    margin-right: 10px;
    margin-left: 10px;
    margin-bottom: 20px;
    max-width: 300px;


   }
   .chat-message-container{
    flex-grow: 1;
    margin-top: 20px;
    overflow: scroll;
    scrollbar-width: none;
    
   }
  </style>
  <body>
    <div class="js-container"></div>
<script src="react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function ChatInput({chatMessages,setChatMessages}){
           const [inputText, setInputText]= React.useState('');
            function saveInput(event){
                setInputText(event.target.value);
            }
            function sendMessage(){
                const newChatmessages =[
                ...chatMessages,
                {
                    message:inputText,
                    sender:'user',
                    id:crypto.randomUUID()
                }
               ]
                  setChatMessages(newChatmessages);

                const response =Chatbot.getResponse(inputText);
                setChatMessages([
                ...newChatmessages,
                {
                    message:response,
                    sender:'robot',
                    id:crypto.randomUUID()
                }
               ]);


               setInputText('');
            }
            return (
                <div className="chat-input-container">
                    <input className="chat-input" placeholder="Send a Message To ChartBot" size="34" onChange={saveInput} value={inputText}></input>
                    <button  className ="send-button" onClick={sendMessage}>Send</button>
                </div>
            );
        }

        function ChatMessage({message,sender}){
            //const message = props.message;
            //const sender = props.sender;
            //short cuts
            //const {message,sender}=props;
          
            return(
                <div className={sender==='user'?'chat-message-user':'chat-message-robot'}>
                    {sender ==="robot" && <img src="images/robot.png" width="50"></img>}
                    <div className="chat-message-text">{message}</div>
                    {sender ==="user" &&<img src="images/user.png" width="50"></img>}
                </div>
            );
        }

        function ChatMessages({chatMessages}){
            //automatically save html elemnt from the component.
            const chatMessagesRef=React.useRef(null);
            //to  scroll automaticallt
            React.useEffect(()=>{
              const containerElem =chatMessagesRef.current
              if(containerElem){containerElem.scrollTop = containerElem.scrollHeight;}
            },[chatMessages]); 
        return (
            <div className='chat-message-container' ref ={chatMessagesRef}>
             
                {chatMessages.map((chatMessages)=>{
                    return(
                    <ChatMessage message={chatMessages.message} 
                    sender ={chatMessages.sender} 
                    key={chatMessages.id}/>
                    );
                })}
            </div>
            );
        }


        function App(){
            const [chatMessages,setChatMessages] =React.useState([]);
            return(
                <div className="app-container">
                
                <ChatMessages  chatMessages={chatMessages} />
                <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages}></ChatInput>
            </div>
            );
        }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App/>);


    </script>
  </body>
</html>
